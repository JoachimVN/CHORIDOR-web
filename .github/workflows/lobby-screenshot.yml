name: Update lobby screenshot

on:
  pull_request:
    branches: [main]
    paths: [frontend/**]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright and Chromium
        run: npm install playwright && npx playwright install chromium --with-deps

      - name: Serve frontend
        run: npx serve frontend --listen 4321 &

      - name: Wait for server
        run: sleep 3

      - name: Take lobby screenshot
        run: node .github/scripts/lobby-screenshot.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/Lobby.png
          if git diff --cached --quiet; then
            echo "No screenshot changes"
            exit 0
          fi
          git commit -m "chore: update lobby screenshot [skip ci]"
          BRANCH=${{ github.head_ref || 'dev' }}
          for i in 1 2 3 4 5; do
            git push origin HEAD:$BRANCH && exit 0
            echo "Push rejected, rebasing on origin/$BRANCH (attempt $i)..."
            git pull --rebase origin $BRANCH
          done
          echo "Failed to push screenshot after 5 attempts" >&2
          exit 1
