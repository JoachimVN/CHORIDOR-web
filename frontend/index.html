<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHORIDOR - Online Multiplayer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="win-overlay" class="win-overlay hidden">
        <div class="win-card" id="win-card">
            <div class="win-pawn" id="win-pawn"></div>
            <div class="win-title" id="win-message"></div>
            <div class="win-divider" id="win-divider"></div>
            <button id="play-again-btn" class="win-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
                Play Again
            </button>
        </div>
    </div>

    <div class="app">
        <div class="top-bar">
            <div class="player-section p1-section">
                <div class="player-dot p1-dot"></div>
                <div class="player-name">Player 1</div>
                <div class="wall-boxes" id="p1-walls"></div>
            </div>

            <img src="images/logos/logo.png" alt="CHORIDOR" class="logo">

            <div class="player-section p2-section">
                <div class="wall-boxes" id="p2-walls"></div>
                <div class="player-name">Player 2</div>
                <div class="player-dot p2-dot"></div>
            </div>
        </div>

        <div class="board-wrapper">
            <canvas id="gameBoard"></canvas>
        </div>

        <div class="bottom-bar">
            <div class="status-label" id="status">Player 1's Turn</div>
            <div class="controls">
                <button id="flip-btn" class="icon-btn" title="Flip board">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 4v6h6M23 20v-6h-6"></path>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64M3.51 15A9 9 0 0 0 18.36 18.36"></path>
                    </svg>
                </button>
                <button id="new-game-btn">New Game</button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
