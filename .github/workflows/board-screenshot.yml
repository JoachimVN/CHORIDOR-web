name: Update board and win screenshots

on:
  push:
    branches: [dev]
    paths:
      - frontend/js/game.js
      - frontend/css/style.css
      - frontend/index.html
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright and Chromium
        run: |
          npm install --no-save --ignore-scripts playwright@1.61.0 pixelmatch@5.3.0 pngjs@7.0.0
          ./node_modules/.bin/playwright install chromium --with-deps

      - name: Serve frontend
        run: python3 -m http.server 4321 --directory frontend &

      - name: Wait for server
        run: sleep 3

      - name: Take board and win screenshots
        run: node .github/scripts/board-screenshot.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/Board.png docs/screenshots/Win.png
          if git diff --cached --quiet; then
            echo "No screenshot changes"
            exit 0
          fi
          git commit -m "chore: update board/win screenshots [skip ci]"
          BRANCH=${{ github.ref_name }}
          for i in 1 2 3 4 5; do
            git push origin HEAD:$BRANCH && exit 0
            echo "Push rejected, rebasing on origin/$BRANCH (attempt $i)..."
            git pull --rebase origin $BRANCH
          done
          echo "Failed to push screenshots after 5 attempts" >&2
          exit 1
