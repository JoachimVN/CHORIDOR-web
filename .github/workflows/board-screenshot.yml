name: Update board and win screenshots

on:
  pull_request:
    branches: [main]
    paths:
      - frontend/js/game.js
      - frontend/css/style.css
      - frontend/index.html
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright and Chromium
        run: npm install playwright && npx playwright install chromium --with-deps

      - name: Serve frontend
        run: npx serve frontend --listen 4321 &

      - name: Wait for server
        run: sleep 3

      - name: Take board and win screenshots
        run: node .github/scripts/board-screenshot.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/Board.png docs/screenshots/Win.png
          git diff --cached --quiet || git commit -m "chore: update board/win screenshots [skip ci]"
          git push origin HEAD:${{ github.head_ref || 'dev' }}
